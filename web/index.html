<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSM — Защищённый мессенджер</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .splash {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .splash-icon {
            font-size: 6rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        .splash-title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0 0.5rem;
        }
        .splash-subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }
        .loader-dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .loader-dots span {
            width: 10px;
            height: 10px;
            background: #6366f1;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash">
        <span class="splash-icon">🔐</span>
        <h1 class="splash-title">XSM</h1>
        <p class="splash-subtitle">eXtreme Secure Messenger</p>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('xsm_token');
        setTimeout(() => {
            window.location.href = token ? '/web/messenger.html' : '/web/auth.html';
        }, 2000);
    </script>
</body>
</html>
