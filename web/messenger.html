<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSM — Мессенджер</title>
    <link rel="stylesheet" href="/web/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="messenger-body">
    <div class="app-layout">
        <!-- Левая навигация -->
        <nav class="nav-sidebar">
            <div class="nav-brand" onclick="window.location.href='/web/messenger.html'">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <div class="nav-menu">
                <button class="nav-btn active" id="nav-chats" title="Чаты">
                    <i class="fa-solid fa-comments"></i>
                </button>
                <button class="nav-btn" id="nav-contacts" title="Контакты">
                    <i class="fa-solid fa-address-book"></i>
                </button>
                <button class="nav-btn" id="nav-settings" title="Настройки">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
            <div class="nav-footer">
                <div class="user-avatar-mini" id="nav-avatar">U</div>
            </div>
        </nav>

        <!-- Боковая панель -->
        <aside class="sidebar-panel" id="sidebar-panel">
            <div class="panel-header">
                <h2 id="panel-title">Чаты</h2>
                <button class="btn-icon" id="new-chat-btn" title="Новый чат">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Поиск...">
            </div>

            <!-- Список чатов -->
            <div class="chats-list" id="chats-list"></div>

            <!-- Список контактов (скрыт) -->
            <div class="contacts-list" id="contacts-list" style="display:none;"></div>

            <!-- Настройки (скрыты) -->
            <div class="settings-content" id="settings-content" style="display:none;">
                <div class="settings-section">
                    <h3>Профиль</h3>
                    <div style="text-align:center;margin:1rem 0;">
                        <img id="settings-avatar-preview" src="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;background:var(--bg-tertiary);" alt="Аватар">
                        <label class="btn btn-secondary" style="margin-top:0.5rem; cursor:pointer;">
                            <i class="fa-solid fa-camera"></i> Загрузить
                            <input type="file" id="avatar-upload-input" accept="image/*" hidden>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span>Имя</span>
                        <input type="text" id="edit-username" class="settings-input" value="">
                    </div>
                    <div class="settings-row">
                        <span>Email</span>
                        <input type="email" id="edit-email" class="settings-input" value="">
                    </div>
                    <div class="settings-row">
                        <span>Статус</span>
                        <input type="text" id="settings-status-text" class="settings-input" placeholder="Не указан">
                    </div>
                    <div class="settings-row">
                        <span>О себе</span>
                        <textarea id="settings-bio" class="settings-input" rows="2" placeholder="Не указано"></textarea>
                    </div>
                    <button id="save-profile-btn" class="btn btn-primary" style="width:100%;margin-top:1rem;">
                        <i class="fa-solid fa-floppy-disk"></i> Сохранить
                    </button>
                </div>

                <!-- Скрытые поля для отображения (используются JS) -->
                <div class="settings-section" style="display:none;">
                    <div class="settings-row"><span id="settings-username-display"></span></div>
                    <div class="settings-row"><span id="settings-email-display"></span></div>
                </div>

                <button class="btn-logout" id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i> Выйти
                </button>
            </div>
        </aside>

        <!-- Основная область -->
        <main class="main-area">
            <!-- Пустое состояние -->
            <div class="empty-state" id="empty-state">
                <div class="empty-icon-wrapper">
                    <i class="fa-solid fa-comments"></i>
                </div>
                <h2>Добро пожаловать в XSM</h2>
                <p>Выберите чат или создайте новый, чтобы начать защищённое общение</p>
            </div>

            <!-- Просмотр чата -->
            <div class="chat-view" id="chat-view" style="display:none;">
                <header class="chat-topbar">
                    <div class="chat-partner">
                        <div class="partner-avatar" id="partner-avatar">Ч</div>
                        <div class="partner-info">
                            <h3 id="partner-name">Чат</h3>
                            <span class="partner-status online" id="partner-status">
                                <i class="fa-solid fa-circle"></i> В сети
                            </span>
                        </div>
                    </div>
                    <div class="topbar-actions">
                        <button class="btn-icon" title="Поиск"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button class="btn-icon" title="Звонок"><i class="fa-solid fa-phone"></i></button>
                        <button class="btn-icon" title="Видео"><i class="fa-solid fa-video"></i></button>
                    </div>
                </header>

                <!-- Сообщения -->
                <div class="messages-container" id="messages-container">
                    <div class="messages-list" id="messages-list"></div>
                </div>

                <!-- Кнопка "Прокрутить вниз" -->
                <button class="scroll-bottom-btn" id="scroll-bottom-btn" title="Прокрутить вниз">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <!-- Композер -->
                <div class="composer">
                    <button class="btn-icon emoji-btn" id="emoji-btn">
                        <i class="fa-regular fa-face-smile"></i>
                    </button>
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно: Новый чат -->
    <div class="modal-overlay" id="new-chat-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="btn-icon modal-close-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <i class="fa-solid fa-magnifying-glass input-icon"></i>
                    <input type="text" id="new-chat-input" placeholder="Поиск пользователей..." autocomplete="off">
                </div>
                <div id="search-results" class="search-results" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel modal-close-btn">Отмена</button>
                <button class="btn-create" id="create-chat-btn" disabled>
                    <i class="fa-solid fa-plus"></i> Создать
                </button>
            </div>
        </div>
    </div>

    <!-- Панель эмодзи -->
    <div class="emoji-picker" id="emoji-picker" style="display:none;">
        <div class="emoji-grid">
            <span>😀</span><span>😂</span><span>😍</span><span>🤔</span><span>😎</span>
            <span>👍</span><span>❤️</span><span>🔥</span><span>🎉</span><span>😢</span>
            <span>😡</span><span>🥳</span><span>🤗</span><span>🙏</span><span>💪</span>
            <span>👋</span><span>✅</span><span>⭐</span><span>💯</span><span>🚀</span>
        </div>
    </div>

    <script src="/web/js/messenger.js"></script>
</body>
</html>
